# Feature engineering configuration (Phase 2.1 — application-level features)

id_column: SK_ID_CURR
target_column: TARGET

# Sentinel value used by Home Credit for "no employment" anomaly in DAYS_EMPLOYED.
days_employed_anomaly_value: 365243

output_paths:
  application_train_features: data/processed/application_train_features.parquet
  application_test_features: data/processed/application_test_features.parquet

# Phase 2.2 — bureau / bureau_balance applicant-level features.
bureau_features:
  id_column: SK_ID_CURR
  bureau_id_column: SK_ID_BUREAU
  output_path: data/processed/bureau_features.parquet

# Phase 2.3 — final train/test ML feature datasets (application + bureau merge).
full_feature_dataset:
  id_column: SK_ID_CURR
  target_column: TARGET
  application_train_features_path: data/processed/application_train_features.parquet
  application_test_features_path: data/processed/application_test_features.parquet
  bureau_features_path: data/processed/bureau_features.parquet
  output_train_path: data/processed/train_features.parquet
  output_test_path: data/processed/test_features.parquet
